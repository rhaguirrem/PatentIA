name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate required signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Create local properties
        env:
          MAPS_API_KEY_SECRET: ${{ secrets.MAPS_API_KEY }}
        run: |
          MAPS_API_KEY_VALUE="$MAPS_API_KEY_SECRET"
          if [ -z "$MAPS_API_KEY_VALUE" ]; then
            MAPS_API_KEY_VALUE="REPLACE_WITH_MAPS_API_KEY"
          fi
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "MAPS_API_KEY=$MAPS_API_KEY_VALUE" >> local.properties

      - name: Derive release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION_NAME=$(grep -oP 'val appVersionName = "\K[^"]+' app/build.gradle.kts)
          VERSION_CODE=$(grep -oP 'val appVersionCode = \K\d+' app/build.gradle.kts)
          TAG_NAME="release-v${VERSION_NAME}-build-${GITHUB_RUN_NUMBER}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Restore Firebase config when available
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          fi

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/patentia-release.jks

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build signed release artifacts
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/patentia-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: PatentIA-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: PatentIA-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: PatentIA ${{ steps.release_meta.outputs.version_name }} build ${{ github.run_number }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          files: |
            app/build/outputs/apk/release/patentia-installer-release.apk
            app/build/outputs/bundle/release/*.aab
            docs/app-update-manifest.json