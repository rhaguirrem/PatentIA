name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create local properties
        env:
          MAPS_API_KEY_SECRET: ${{ secrets.MAPS_API_KEY }}
        run: |
          MAPS_API_KEY_VALUE="$MAPS_API_KEY_SECRET"
          if [ -z "$MAPS_API_KEY_VALUE" ]; then
            MAPS_API_KEY_VALUE="REPLACE_WITH_MAPS_API_KEY"
          fi
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "MAPS_API_KEY=$MAPS_API_KEY_VALUE" >> local.properties

      - name: Restore Firebase config when available
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PatentIA-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: PatentIA-lint-report
          path: app/build/reports/lint-results-debug.html