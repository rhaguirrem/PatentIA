name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY || 'REPLACE_WITH_MAPS_API_KEY' }}" >> local.properties

      - name: Restore Firebase config when available
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PatentIA-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: PatentIA-lint-report
          path: app/build/reports/lint-results-debug.html